name: PMEAT Notice Scraper

on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিট পর পর অটো রান করবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -f sent_notices.txt ]; then
          git add sent_notices.txt
          # ৪MD৩ পারমিশন এরর ফিক্স করার জন্য টোকেন রিমোট ইউআরএল সেটআপ
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git commit -m "Update sent notices track file" && git push || echo "No changes to commit"
        else
          echo "sent_notices.txt not found."
        fi
