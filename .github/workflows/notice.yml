name: PMEAT Notice Telegram Alert

on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিট পর পর চলবে
  workflow_dispatch:

jobs:
  check-notice:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run PMEAT notice checker
      run: python pmeat_main.py  # 👈 নতুন ফাইলের নাম

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add pmeat_notices.txt || true  # 👈 নতুন ট্র্যাকিং ফাইল
        git commit -m "Update PMEAT notices list [skip ci]" || true
        git push || true
